app-id: io.github.saleguas.librewolfprofiles
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: io.github.saleguas.librewolfprofiles

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: librewolf-profiles
    buildsystem: meson
    sources:
      - type: dir
        path: .
